info:
  name: Alle Mitglieder
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{restUrl}}"
  body:
    query: |
      {
        mitglieder {
          id
          vorname
          nachname
          email
        }
      }

runtime:
  variables:
    - name: restUrl
      value: https://127.0.0.1:8000/graphql

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
