info:
  name: Alle Mitglieder
  type: graphql
  seq: 1

graphql:
  method: POST
  url: https://127.0.0.1:8000/graphql
  body:
    query: |
      {
        mitglieder {
          id
          vorname
          nachname
          email
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
