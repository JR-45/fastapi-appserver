info:
  name: Neues Mitglied
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{restUrl}}"
  body:
    query: |-
      mutation {
        create(mitgliedInput: {
          vorname: "Francis"
          nachname: "Powers"
          email: "u2pilot@cia.gov"
          geburtsdatum: "1929-08-17"
          telefonnummer: "+49-800-19600501"
          beitrittsdatum: "2026-01-01"
          geschlecht: MAENNLICH
          mitgliedsstatus: AKTIV
          ausweis: {
            ausstellungsdatum: "2026-01-01"
            ablaufdatum: "2028-01-01"
          }
        }) {
          id
        }
      }

runtime:
  variables:
    - name: restUrl
      value: https://127.0.0.1:8000/graphql

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
