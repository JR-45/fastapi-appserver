info:
  name: Neues Mitglied
  type: graphql
  seq: 3

graphql:
  method: POST
  url: https://127.0.0.1:8000/graphql
  body:
    query: |-
      mutation {
        create(
          mitgliedInput: {
            vorname: "Elon"
            nachname: "Musk"
            email: "tesla@test.graphql"
            geburtsdatum: "1989-02-02"
            telefonnummer: "01234123412"
            geschlecht: MAENNLICH
            mitgliedsstatus: INAKTIV
            beitrittsdatum: "2023-01-31",
            interessen: [ROMAN]
            ausweis: {
          		ausstellungsdatum: "2023-01-31",
          		ablaufdatum: "2028-01-31"
            }
       }
        ) {
          id
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
