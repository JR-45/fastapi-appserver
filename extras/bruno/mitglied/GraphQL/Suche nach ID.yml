info:
  name: Suche nach ID
  type: graphql
  seq: 2

graphql:
  method: POST
  url: https://127.0.0.1:8000/graphql
  body:
    query: |
      {
        mitglied(mitgliedId: "1") {
          id
          vorname
          nachname
          email
          geburtsdatum
          telefonnummer
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
