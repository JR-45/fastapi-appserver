info:
  name: Nach Alle
  type: http
  seq: 1

http:
  method: GET
  url: "{{restUrl}}"
  headers:
    - name: Accept
      value: application/json
  auth: inherit

runtime:
  variables:
    - name: restUrl
      value: http://127.0.0.1:8000/rest
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
