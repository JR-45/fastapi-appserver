info:
  name: "Suche nach ID "
  type: http
  seq: 2

http:
  method: GET
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
    - name: If-None-Match
      value: '"0"'
  params:
    - name: id
      value: "20"
      type: path
  auth: inherit

runtime:
  variables:
    - name: restUrl
      value: https://127.0.0.1:8000/rest
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.id
      operator: eq
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
