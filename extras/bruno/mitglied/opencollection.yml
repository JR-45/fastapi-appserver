opencollection: 1.0.0

info:
  name: mitglied
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: "{{oidcTokenUrl}}"
    credentials:
      clientId: "{{clientId}}"
      clientSecret: "{{clientSecret}}"
      placement: body
    resourceOwner:
      username: "{{username}}"
      password: "{{password}}"
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
  variables:
    - name: oidcTokenUrl
      value: https://localhost:8843/realms/python/protocol/openid-connect/token
    - name: clientId
      value: python-client
    - name: username
      value: admin
    - name: password
      value: p
    - name: clientSecret
      value: wuz5fCGmNxMsRk7KJjkYwf7XvjEp7aM4
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
