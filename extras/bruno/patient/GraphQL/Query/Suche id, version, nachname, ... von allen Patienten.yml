info:
  name: Suche id, version, nachname, ... von allen Mitglieder
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      {
        mitglieder(suchparameter: {}) {
          id
          version
          nachname
          email
          kategorie
          hasNewsletter
          geburtsdatum
          homepage
          geschlecht
          familienstand
          adresse {
            plz
            ort
          }
          fachaerzte
          username
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body mit den Properties', () => {
          res.getBody()
            .data
            .mitglieder
            .forEach(mitglied => {
              const { id, version, nachname, email, kategorie, hasNewsletter, geburtsdatum, homepage, geschlecht, familienstand, adresse, fachaerzte, username } = mitglied;
              expect(id).to.be.gte(0);
              expect(version).to.be.gte(0);
              expect(nachname).to.be.a('string').that.is.not.empty;
              expect(email).to.be.a('string').that.is.not.empty;
              expect(kategorie).to.be.gte(0);
              expect(hasNewsletter).to.be.a('boolean');
              expect(geburtsdatum).to.be.a('string');
              expect(homepage).to.be.a('string');
              expect(geschlecht).to.be.a('string');
              expect(familienstand).to.be.a('string');
              expect(adresse).to.be.an('object').that.is.not.empty;
              expect(fachaerzte).to.be.an('array');
              expect(username).to.be.a('string').that.is.not.empty;
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.mitglieder
      operator: isArray
    - expression: res.body.data.mitglieder
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
