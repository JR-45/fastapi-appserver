info:
  name: Suche nachname, email, ... vom Mitglieder mit ID 20
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($mitgliedId: ID! = "20") {
        mitglied(mitgliedId: $mitgliedId) {
          id
          version
          nachname
          email
          kategorie
          hasNewsletter
          geburtsdatum
          homepage
          geschlecht
          familienstand
          adresse {
            plz
            ort
          }
          fachaerzte
          username
        }
      }
    variables: |-
      {
        "mitgliedId": "20"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.mitglied
      operator: isJson
    - expression: res.body.data.mitglied.version
      operator: gte
      value: "0"
    - expression: res.body.data.mitglied.nachname
      operator: isString
    - expression: res.body.data.mitglied.nachname
      operator: isNotEmpty
    - expression: res.body.data.mitglied.email
      operator: isString
    - expression: res.body.data.mitglied.email
      operator: isNotEmpty
    - expression: res.body.data.mitglied.kategorie
      operator: gt
      value: "0"
    - expression: res.body.data.mitglied.hasNewsletter
      operator: isBoolean
    - expression: res.body.data.mitglied.geburtsdatum
      operator: isString
    - expression: res.body.data.mitglied.homepage
      operator: isString
    - expression: res.body.data.mitglied.geschlecht
      operator: isString
    - expression: res.body.data.mitglied.familienstand
      operator: isString
    - expression: res.body.data.mitglied.adresse
      operator: isJson
    - expression: res.body.data.mitglied.fachaerzte
      operator: isArray
    - expression: res.body.data.mitglied.username
      operator: isString
    - expression: res.body.data.mitglied.username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
